name: my Downloader 1

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "URL to download"
        required: true
        default: "https://civitai.com/models/2611889/rebels-hidream-01-image-dev?modelVersionId=2937990"
      split_size:
        description: "Split size in MB (e.g., 90, 100, 200)"
        required: false
        default: "90"
        type: string

jobs:
  engine:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛠 Prepare Environment
        uses: actions/checkout@v4

      - name: 📦 Install Tools (Always runs but cached by GitHub)
        run: |
          sudo apt update
          sudo apt install -y aria2 p7zip-full
          mkdir -p downloads/ raw/ checksum/

      - name: ⚡ Download File
        run: |
          URL="${{ github.event.inputs.urls }}"
          echo "📥 Downloading: $URL"
          aria2c -x 16 -s 16 -j 5 \
                 --connect-timeout=30 \
                 --timeout=60 \
                 --split=16 \
                 --min-split-size=1M \
                 --max-connection-per-server=16 \
                 --retry-wait=5 \
                 --max-tries=10 \
                 --content-disposition=true \
                 --dir=raw/ \
                 "$URL"

      - name: 🏗 Split into Parts
        run: |
          SPLIT_SIZE="${{ github.event.inputs.split_size }}"
          echo "📦 Splitting files into ${SPLIT_SIZE}MB parts"
          
          find raw/ -type f | while read -r file; do
            filename=$(basename "$file")
            echo "Splitting: $filename"
            sha256sum "$file" >> checksum/SHA256SUMS.txt
            7z a "downloads/${filename}.7z" "$file" "-v${SPLIT_SIZE}m" -mx0
          done

      - name: 📤 Upload Parts ONE BY ONE
        run: |
          git config --local user.email "mail@github.com"
          git config --local user.name "Downloader1"

          PARTS=$(ls downloads/*.7z.* 2>/dev/null || echo "")

          for part in $PARTS; do
            echo "📤 Uploading: $(basename $part)"
            git add "$part"
            git commit -m "Add $(basename $part)" 2>/dev/null || echo "Nothing to commit"
            
            for attempt in 1 2 3; do
              echo "Attempt $attempt for $(basename $part)"
              if git push; then
                echo "✅ Uploaded: $(basename $part)"
                break
              else
                echo "⚠️ Failed, retrying in 10 seconds..."
                sleep 10
              fi
            done
            sleep 5
          done

      - name: 📊 Generation Info
        run: |
          echo "### 📂 Download Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Split Size:** ${{ github.event.inputs.split_size }}MB" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -R downloads/ >> $GITHUB_STEP_SUMMARY
          echo "### ⚡ Checksums" >> $GITHUB_STEP_SUMMARY
          cat checksum/SHA256SUMS.txt >> $GITHUB_STEP_SUMMARY
